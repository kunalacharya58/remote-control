<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS Remote</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family: "JetBrains Mono", monospace;
}
</style>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

</head>

<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen">

<!-- Status widget -->
<div id="status" class="absolute top-4 right-4 flex items-center gap-2 text-xs font-semibold text-gray-100">
  <span id="status-dot" class="h-2 w-2 rounded-full bg-red-500"></span>
  <span id="status-text" class="flex items-center gap-1">
    <span id="battery-perc">--%</span>
    <span id="battery-icon" class="text-yellow-300" aria-hidden="true"> </span>
  </span>
</div>

<div class="flex-1 flex items-center justify-center">

<div class="w-full max-w-sm px-4">

<h1 class="text-center text-2xl font-semibold mb-6 text-green-400">
WHAT DO YOU WANT..?
</h1>

<div class="grid grid-cols-2 gap-3">

<button onclick="send('CLOSE_BROWSER')" class="btn bg-red-500">Close Chrome</button>

<button onclick="send('CLOSE_ALL')" class="btn bg-red-700">Close All</button>



<button onclick="send('MUTE')" class="btn bg-blue-400 text-black">Toggle Mute</button>

<button onclick="send('SCREENSHOT')" class="btn bg-blue-800">Screenshot</button>



<!-- <button onclick="send('PAUSE_MEDIA')" class="btn bg-purple-500">Pause Media</button> -->

<button onclick="send('VOLUME_HALF')" class="btn bg-green-500 text-black">Volume 50%</button>

<button onclick="send('VOLUME_FULL')" class="btn bg-green-700">Volume Full</button>



<button onclick="send('BRIGHTNESS_HALF')" class="btn bg-yellow-600">Bright 50%</button>

<button onclick="send('BRIGHTNESS_FULL')" class="btn bg-yellow-400 text-black">Bright Full</button>



<button onclick="send('LOCK')" class="btn bg-pink-600">Lock</button>

<button onclick="send('REBOOT')" class="btn bg-orange-600">Reboot</button>




<button onclick="send('SLEEP')" class="btn bg-gray-800 border border-gray-500">Sleep</button>

<button onclick="send('SHUTDOWN')" class="btn bg-black border border-red-500 text-red-400">Shutdown</button>

  </div>
</div>

</div>

<footer class="text-center text-xs text-gray-500 pb-3">
  developed by @jarvis7698
</footer>

<script>

const COOKIE_NAME = "jarvis_token"
const COOKIE_DURATION = 5 * 60 * 1000

function setCookie(value){
    const expires = new Date(Date.now() + COOKIE_DURATION).toUTCString()
    document.cookie = `${COOKIE_NAME}=${value}; expires=${expires}; path=/`
}

function getCookie(){

    const cookies = document.cookie.split("; ")

    for(const c of cookies){
        const [name,value] = c.split("=")
        if(name === COOKIE_NAME) return value
    }

    return null
}

async function send(cmd){

  let token = getCookie()
  let passphrase = null

  if(!token){
      passphrase = prompt("Enter passphrase")
      if(!passphrase) return
  }

  const res = await fetch("/.netlify/functions/sendCommands",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      command:cmd,
      passphrase:passphrase,
      token:token
    })
  })

  if(res.status === 401){
      alert("Incorrect passphrase")
      return
  }

  const data = await res.json()

  if(data.token){
      setCookie(data.token)
  }
  alert("Command sent")

  // Refresh status after issuing a command (it may change online/battery state)
  updateStatus().catch(() => {})
}

let statusState = {
  online: false,
  battery: "--",
  charging: false
}
let statusFailureCount = 0

function renderStatus(){
  const dot = document.getElementById("status-dot")
  const perc = document.getElementById("battery-perc")
  const icon = document.getElementById("battery-icon")

  dot.className = statusState.online
    ? "h-2 w-2 rounded-full bg-green-500"
    : "h-2 w-2 rounded-full bg-red-500"

  perc.textContent = statusState.online ? `${statusState.battery ?? "--"}%` : "--%"
  icon.textContent = statusState.online && statusState.charging ? "⚡" : " "
}

async function updateStatus(){
  try {
    const res = await fetch("/.netlify/functions/getStatus")
    if(!res.ok) throw new Error("non-200")

    const data = await res.json()

    statusFailureCount = 0
    statusState.online = !!data.online
    statusState.battery = data.battery ?? "--"
    statusState.charging = !!data.charging

    renderStatus()
  } catch (err) {
    statusFailureCount += 1
    // Only flip to offline after a few consecutive failures to avoid flicker
    if(statusFailureCount >= 3){
      statusState.online = false
      statusState.battery = "--"
      statusState.charging = false
      renderStatus()
    }
  }
}

// Initial render + poll status every 10s
renderStatus()
updateStatus()
setInterval(updateStatus, 10_000)

</script>



<style>

.btn{
    height:64px;
    border-radius:12px;
    font-weight:600;
    font-size:0.95rem;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .15s ease;
}

.btn:active{
    transform:scale(.95);
}

</style>

</body>
