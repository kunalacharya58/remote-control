<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS Remote</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- JetBrains Mono Font -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family: "JetBrains Mono", monospace;
}
</style>

</head>

<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-4">

<h1 class="text-center text-4xl font-semibold mb-6 text-green-400">
WHAT DO YOU WANT..?
</h1>

<div class="grid grid-cols-2 gap-4">

<button onclick="send('CLOSE_BROWSER')" class="btn bg-red-500">Close Browser</button>

<button onclick="send('CLOSE_ALL')" class="btn bg-red-700">Close All</button>

<button onclick="send('MUTE')" class="btn bg-yellow-500 text-black">Mute</button>

<button onclick="send('PAUSE_MEDIA')" class="btn bg-purple-500">Pause Media</button>

<button onclick="send('VOLUME_HALF')" class="btn bg-blue-500">Volume 50%</button>

<button onclick="send('VOLUME_FULL')" class="btn bg-blue-700">Volume Full</button>

<button onclick="send('BRIGHTNESS_HALF')" class="btn bg-indigo-500">Lower Brightness</button>

<button onclick="send('LOCK')" class="btn bg-gray-600">Lock</button>

<button onclick="send('SLEEP')" class="btn bg-gray-700">Sleep</button>

<button onclick="send('SHUTDOWN')" class="btn bg-black border border-red-500 text-red-400">Shutdown</button>

</div>

</div>

<script>

async function send(cmd){

  const passphrase = prompt("Enter passphrase")

  if(!passphrase) return

  const res = await fetch("/.netlify/functions/sendCommands",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      command:cmd,
      passphrase:passphrase
    })
  })

  if(res.status === 401){
    alert("Incorrect passphrase")
    return
  }

  if(res.status === 200){
    console.log("Command sent:", cmd)
  }

}

</script>

<style>

.btn{
    padding:18px;
    border-radius:12px;
    font-weight:600;
    transition:all .15s ease;
}

.btn:active{
    transform:scale(.96);
}

</style>

</body>
</html>
